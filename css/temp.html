    <summary>萨尔维娅·博纳罗蒂</summary>
<center>✥✥✥✥✥</center>
<p><center><i>她是一场<br>突如其来的飓风。<br>摧毁被卷入其中的一切。<br>风暴中央，<br>一颗空洞的心<br>独为她的爱跳动。</i></center></p>
<p><center><i>她是一株<br>披上人皮的植物。<br>绽放着数千年来<br>文学作品中女性的美德。<br>楚楚可怜，<br>根茎缠绕着受害者的遗骨。</i></center></p>
<p><center><i>她向每一个<br>不幸靠近的人<br>要求爱，<br>然后回报以<br>冰冷的吻与虐待。<br></i></center></p>
<p><center><i>爱，血，美<br>凝聚成她闪耀的<br>疯狂。<br>而我们心甘情愿</i></center></p>
<p><center><i>为她献上<br>灵魂</i></center></p>
<p><center><i>还有她爱人的<br>死亡。</i></center></p>
<center>✥✥✥✥✥</center>
